name: U41-C Runtime Patch

on:
  pull_request:
    branches: [main]
    paths:
      - 'electron/main.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/setup-electron-desktop.mjs'
      - 'scripts/run-stable-regression.mjs'
      - 'scripts/verify-u41c-runtime-patch.mjs'
      - 'src/app/TopBar.tsx'
      - 'src/components/SettingsMaintenanceEntry.tsx'
      - 'tests/fixtures/mpv/fake-mpv.mjs'
      - 'tests/fixtures/mpv/fake-mpv-stability.mjs'
      - '.gitattributes'
      - 'electron-builder.config.cjs'
      - '.github/workflows/u41c-runtime-patch.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: u41c-runtime-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-runtime-and-packaging:
    name: Windows Electron, protocol, player and packaging regression
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Audit direct runtime dependency risk
        run: npm audit --audit-level=moderate
      - name: Prepare Electron and packager
        run: |
          npm rebuild electron
          npm run patch:electron-builder
      - name: Validate runtime patch sources
        run: |
          npm run lint
          npm run build
          npm run build:electron
          npm run verify:u41b-daily-user-entry
          npm run verify:u41c-runtime-patch
          node scripts/verify-beta3-runtime-hardening.mjs
      - name: Custom protocol and player Electron E2E
        run: |
          npm run test:u28:electron-e2e
          npm run test:u29:electron-e2e
      - name: Build portable and NSIS packages
        run: npm run desktop:dist
      - name: Packaged install and page readiness
        run: |
          node scripts/test-u32-release-candidate-packaging.mjs
          node scripts/test-u32-packaged-page-readiness.mjs
