name: Apply U40-D Retest Fixes

on:
  push:
    branches:
      - fix/u40d-codex-retest
    paths:
      - 'scripts/apply-u40d-retest-fixes.mjs'
      - '.github/workflows/apply-u40d-retest-fixes.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/u40d-codex-retest
          fetch-depth: 0

      - name: Apply exact source patch
        run: node scripts/apply-u40d-retest-fixes.mjs

      - name: Commit patched sources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/main.ts src/app/themeRuntime.ts src/app/ThemeRuntimeBridge.tsx src/components/PlaylistPage.tsx src/components/ImporterPage.tsx
          git diff --cached --check
          git commit -m "U40-D2: fix Codex retest regressions"
          git push origin HEAD:fix/u40d-codex-retest
