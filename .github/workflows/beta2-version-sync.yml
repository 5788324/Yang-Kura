name: Beta 2 Version Sync

on:
  push:
    branches:
      - agent/personal-release-beta2
    paths:
      - '.github/workflows/beta2-version-sync.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/personal-release-beta2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Synchronize package versions
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const version = '0.169.0-beta.2';
          const title = 'Yang-Kura 0.169.0 Beta 2 · 个人日用版';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          pkg.u33BetaRelease = `${version} / v${version} / ${title}`;
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          lock.version = version;
          if (lock.packages?.['']) lock.packages[''].version = version;
          fs.writeFileSync('package-lock.json', `${JSON.stringify(lock, null, 2)}\n`);
          NODE
      - name: Commit synchronized versions
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo 'Versions already synchronized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          git commit -m 'release: set version 0.169.0-beta.2'
          git push origin HEAD:agent/personal-release-beta2
