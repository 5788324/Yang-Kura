name: U26 Fix Details Closing

on:
  push:
    branches:
      - codex/u26-ai-library-maintenance
    paths:
      - scripts/fix-u26-details-closing.mjs
      - .github/workflows/u26-fix-details-closing.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Check out U26 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u26-ai-library-maintenance
          fetch-depth: 0
      - name: Fix exact U26 closing boundary
        shell: pwsh
        run: node scripts/fix-u26-details-closing.mjs
      - name: Remove one-time fix files
        shell: pwsh
        run: |
          Remove-Item scripts/fix-u26-details-closing.mjs
          Remove-Item .github/workflows/u26-fix-details-closing.yml
      - name: Commit closing fix
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close U26 library maintenance details"
          git push origin HEAD:codex/u26-ai-library-maintenance
