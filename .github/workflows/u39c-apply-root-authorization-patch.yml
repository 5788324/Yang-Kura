name: U39-C Apply Root Authorization Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-u39c-root-authorization-persistence.mjs'
      - '.github/workflows/u39c-apply-root-authorization-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/u39c-root-authorization-persistence
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply deterministic patch
        id: patch
        shell: bash
        run: |
          cp scripts/apply-u39c-root-authorization-persistence.mjs /tmp/u39c-patch-source.mjs
          python - <<'PY'
          from pathlib import Path
          target = Path('scripts/apply-u39c-root-authorization-persistence.mjs')
          source = target.read_text(encoding='utf-8')
          replacements = {
              '- U39-B：设置页顶部新增独立 AI 维护入口；Diagnostics 继续两阶段按需加载，并可返回设置。\\n': '- U39-B：设置页提供独立 AI 维护入口；维护概览、性能诊断和完整历史诊断逐级按需加载。\\n',
              "  '8. `docs/architecture/U39_MAINTENANCE_ENTRY.md`\\n',": "  '9. `docs/architecture/U39_MAINTENANCE_ENTRY.md`\\n',",
              "  '9. `docs/architecture/U39_ROOT_AUTHORIZATION_PERSISTENCE.md`\\n',": "  '10. `docs/architecture/U39_ROOT_AUTHORIZATION_PERSISTENCE.md`\\n',",
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f'patch compatibility source missing: {old}')
              source = source.replace(old, new)
          target.write_text(source, encoding='utf-8')
          PY
          set +e
          node scripts/apply-u39c-root-authorization-persistence.mjs > u39c-patch.log 2>&1
          code=$?
          mv /tmp/u39c-patch-source.mjs scripts/apply-u39c-root-authorization-persistence.mjs
          cat u39c-patch.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u39c-patch-log
          path: u39c-patch.log
          if-no-files-found: error
          retention-days: 3
      - name: Require successful patch
        if: steps.patch.outputs.exit_code != '0'
        run: exit 1
      - name: Commit generated changes
        if: steps.patch.outputs.exit_code == '0'
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix root authorization persistence"
          git push origin HEAD:agent/u39c-root-authorization-persistence
