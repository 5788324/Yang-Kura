name: U39-C Apply Root Authorization Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-u39c-root-authorization-persistence.mjs'
      - '.github/workflows/u39c-apply-root-authorization-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/u39c-root-authorization-persistence
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply deterministic patch
        id: patch
        shell: bash
        run: |
          set +e
          node scripts/apply-u39c-root-authorization-persistence.mjs > u39c-patch.log 2>&1
          code=$?
          cat u39c-patch.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u39c-patch-log
          path: u39c-patch.log
          if-no-files-found: error
          retention-days: 3
      - name: Require successful patch
        if: steps.patch.outputs.exit_code != '0'
        run: exit 1
      - name: Commit generated changes
        if: steps.patch.outputs.exit_code == '0'
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix root authorization persistence"
          git push origin HEAD:agent/u39c-root-authorization-persistence
