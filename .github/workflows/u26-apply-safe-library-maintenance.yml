name: U26 Apply Safe Library Maintenance

on:
  push:
    branches:
      - codex/u26-safe-library-maintenance
    paths:
      - scripts/apply-u26-safe-library-maintenance.mjs
      - .github/workflows/u26-apply-safe-library-maintenance.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out clean U26 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u26-safe-library-maintenance
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply exact non-invasive patch
        shell: pwsh
        run: node scripts/apply-u26-safe-library-maintenance.mjs

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify U26 before committing source
        shell: pwsh
        run: |
          node scripts/verify-u26-safe-library-maintenance.mjs
          npm run lint
          git diff --check

      - name: Remove one-time patch files
        shell: pwsh
        run: |
          Remove-Item scripts/apply-u26-safe-library-maintenance.mjs
          Remove-Item .github/workflows/u26-apply-safe-library-maintenance.yml

      - name: Commit verified U26 source
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: gate library maintenance with safe visibility toggle"
          git push origin HEAD:codex/u26-safe-library-maintenance
