name: U25 Apply Engineering Surface Cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-u25-engineering-surface-cleanup.mjs'
      - '.github/workflows/u25-apply-engineering-surface-cleanup.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    steps:
      - name: Check out U25 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply exact U25 source patch
        shell: pwsh
        run: node scripts/apply-u25-engineering-surface-cleanup.mjs

      - name: Remove one-time patch files
        shell: pwsh
        run: |
          Remove-Item scripts/apply-u25-engineering-surface-cleanup.mjs
          Remove-Item .github/workflows/u25-apply-engineering-surface-cleanup.yml

      - name: Commit patched source
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/Dashboard.tsx src/components/SettingsPage.tsx scripts/apply-u25-engineering-surface-cleanup.mjs .github/workflows/u25-apply-engineering-surface-cleanup.yml
          git commit -m "refactor: hide engineering-only UI surfaces"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
