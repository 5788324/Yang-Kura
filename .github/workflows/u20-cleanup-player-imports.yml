name: Apply U20 PlayerBar Import Cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U20 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u20-player-auxiliary-controls
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply import cleanup
        run: node scripts/apply-u20-player-import-cleanup.mjs

      - name: Remove temporary cleanup automation
        shell: bash
        run: |
          rm scripts/apply-u20-player-import-cleanup.mjs
          rm .github/workflows/u20-cleanup-player-imports.yml

      - name: Commit cleaned source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove moved PlayerBar imports"
          git push origin HEAD:codex/u20-player-auxiliary-controls
