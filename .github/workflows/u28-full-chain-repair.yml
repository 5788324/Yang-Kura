name: U28 Full Chain Repair

on:
  push:
    branches:
      - agent/u28-library-reconciliation
    paths:
      - scripts/apply-u28-full-chain-fix.mjs
      - scripts/test-u28-electron-e2e.mjs
      - .github/workflows/u28-full-chain-repair.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: u28-full-chain-repair
  cancel-in-progress: true

jobs:
  repair-validate-commit:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/u28-library-reconciliation
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply deterministic U28 product and validation patch
        run: node scripts/apply-u28-full-chain-fix.mjs

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild Electron runtime
        run: npm rebuild electron

      - name: TypeScript validation
        run: npm run lint

      - name: Build desktop application
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run build
          npm run build:electron

      - name: U28 Electron full-chain UI acceptance
        run: npm run test:u28:electron-e2e

      - name: Focused U28 state verifier
        run: node scripts/verify-u28-library-reconciliation.mjs

      - name: Stable regression
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run verify:stable

      - name: Production renderer build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build

      - name: Upload Electron UI screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u28-electron-e2e-repair
          path: artifacts/u28-electron-e2e
          if-no-files-found: warn
          retention-days: 14

      - name: Commit validated repair
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/Dashboard.tsx electron/main.ts scripts/verify-u28-library-reconciliation.mjs scripts/test-u28-electron-e2e.mjs package.json .github/workflows/branch-validation.yml
          if (git diff --cached --quiet) {
            Write-Host "No product repair to commit."
          } else {
            git commit -m "fix: validate U28 library state end to end"
            git push origin HEAD:agent/u28-library-reconciliation
          }
