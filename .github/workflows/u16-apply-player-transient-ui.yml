name: Apply U16 Player Transient UI Hooks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U16 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u16-player-transient-ui-hooks
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused PlayerBar patch
        run: node scripts/apply-u16-player-transient-ui-hooks.mjs

      - name: Verify transient UI hooks
        run: node scripts/verify-u16-player-transient-ui-hooks.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u16-player-transient-ui-hooks.mjs
          rm .github/workflows/u16-apply-player-transient-ui.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract player transient UI hooks"
          git push origin HEAD:codex/u16-player-transient-ui-hooks
