name: U40-D Real Library Stability

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: u40d-real-library-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: Detect U40-D scope
    runs-on: ubuntu-latest
    outputs:
      requires_u40d: ${{ steps.scope.outputs.requires_u40d }}
    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect current push scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "requires_u40d=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          action="${{ github.event.action }}"
          before="${{ github.event.before }}"
          if [[ "$action" == "synchronize" && -n "$before" && ! "$before" =~ ^0+$ ]]; then
            base="$before"
          else
            base="${{ github.event.pull_request.base.sha }}"
          fi

          files="$(git diff --name-only "$base" HEAD)"
          echo "scope_base=$base"
          echo "scope_head=$(git rev-parse HEAD)"
          printf '%s\n' "$files" | sed '/^$/d;s/^/changed_file=/'

          requires_u40d=false
          while IFS= read -r file; do
            case "$file" in
              src/*|src/**/*|electron/preload.ts|scripts/test-u40d-*.mjs|scripts/run-u40d-focused-tests.mjs|scripts/verify-u40d-real-library-stability.mjs|docs/CODEX_REAL_MACHINE_FULL_ACCEPTANCE.md|docs/U40D_*.md)
                requires_u40d=true
                break
                ;;
            esac
          done <<< "$files"

          echo "requires_u40d=$requires_u40d" >> "$GITHUB_OUTPUT"
          echo "requires_u40d=$requires_u40d"

  real-library-stability:
    name: Windows real-library stability and Issue 66 closeout
    needs: scope
    if: needs.scope.outputs.requires_u40d == 'true'
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Prepare Electron runtime
        shell: pwsh
        run: |
          npm rebuild electron
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run patch:electron-builder
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: TypeScript and builds
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build:electron
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Focused U40-D regressions and closeout verification
        run: node scripts/run-u40d-focused-tests.mjs

      - name: Resource library and restart flow
        run: npm run test:u28:electron-e2e

      - name: Player, subtitle and persisted session flow
        run: npm run test:u29:electron-e2e

      - name: Theme, window, keyboard and reduced motion
        run: npm run test:u30:ui-matrix

      - name: Daily pages and visible controls
        run: node scripts/test-u32-ui-audit.mjs

      - name: Full product journey regression
        run: node scripts/test-u40b-full-product-journey.mjs

      - name: Upload U40-D evidence and Codex plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u40d-real-library-stability
          path: |
            artifacts/u40d-real-library-stability
            artifacts/u28-electron-e2e
            artifacts/u29-electron-e2e
            artifacts/u30-ui-matrix
            artifacts/u32-ui-audit
            artifacts/u40b-full-product-acceptance
            docs/CODEX_REAL_MACHINE_FULL_ACCEPTANCE.md
            docs/U40D_DEFECT_CLOSEOUT.md
            docs/U40D_TEST_MATRIX.md
          if-no-files-found: warn
          retention-days: 30
