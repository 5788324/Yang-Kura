name: Apply U17 Player Transient Presenters

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U17 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u17-player-transient-presenters
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused PlayerBar presenter patch
        run: node scripts/apply-u17-player-transient-presenters.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u17-player-transient-presenters.mjs
          rm .github/workflows/u17-apply-player-presenters.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract player transient presenters"
          git push origin HEAD:codex/u17-player-transient-presenters
