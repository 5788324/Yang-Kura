name: Apply U19 Player Primary Sections

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U19 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u19-player-primary-sections
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused PlayerBar primary section patch
        run: node scripts/apply-u19-player-primary-sections.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u19-player-primary-sections.mjs
          rm .github/workflows/u19-apply-player-primary-sections.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: integrate player primary sections"
          git push origin HEAD:codex/u19-player-primary-sections
