name: Apply U05 Truthful ASMR State

on:
  push:
    branches:
      - codex/u05-asmr-truthful-state

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U05 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u05-asmr-truthful-state
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused source patch
        run: node scripts/apply-u05-asmr-truthful-state.mjs

      - name: Verify truthful ASMR state
        run: node scripts/verify-u05-asmr-truthful-state.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u05-asmr-truthful-state.mjs
          rm .github/workflows/u05-apply-truthful-state.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AsmrDetail.tsx scripts/verify-u05-asmr-truthful-state.mjs docs/U05_ASMR_TRUTHFUL_STATE.md scripts/apply-u05-asmr-truthful-state.mjs .github/workflows/u05-apply-truthful-state.yml
          git commit -m "feat: remove seeded ASMR detail state"
          git push origin HEAD:codex/u05-asmr-truthful-state
