name: Format U40-D3 Source

on:
  push:
    branches:
      - fix/u40d3-html-audio-stall
    paths:
      - '.github/workflows/format-u40d3-source.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/u40d3-html-audio-stall
          fetch-depth: 0

      - name: Normalize generated formatting
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'src/hooks/usePlayerBackend.ts';
          let text = fs.readFileSync(file, 'utf8');
          const start = text.indexOf('function safeDuration');
          const endMarker = '\n\nexport function usePlayerBackend';
          const end = text.indexOf(endMarker, start);
          if (start < 0 || end < 0) throw new Error('U40-D3 helper block not found');
          const block = `function safeDuration(value: number): number {
            return Number.isFinite(value) && value > 0 ? value : 0;
          }

          const HTML_AUDIO_METADATA_TIMEOUT_MS = 10_000;
          const HTML_AUDIO_PLAY_TIMEOUT_MS = 10_000;

          function htmlAudioFallbackFailureMessage(extension?: string): string {
            const format = extension ? \`.\${extension}\` : '当前格式';
            return \`基础播放在 10 秒内无法读取或启动\${format}音频。请在“设置 → 播放方式”中选择 mpv，或改用基础播放支持的音频编码。\`;
          }

          async function waitForHtmlAudioMetadata(audio: HTMLAudioElement, extension?: string): Promise<void> {
            if (audio.readyState >= 1) return;
            await new Promise<void>((resolve, reject) => {
              let timer: number | undefined;
              const cleanup = () => {
                if (timer !== undefined) window.clearTimeout(timer);
                audio.removeEventListener('loadedmetadata', handleReady);
                audio.removeEventListener('error', handleFailure);
              };
              const handleReady = () => {
                cleanup();
                resolve();
              };
              const handleFailure = () => {
                cleanup();
                const detail = audio.error?.message || (audio.error ? \`错误码 \${audio.error.code}\` : '未知媒体错误');
                reject(new Error(\`基础播放无法读取当前音频元数据：\${detail}。请在“设置 → 播放方式”中选择 mpv。\`));
              };
              timer = window.setTimeout(() => {
                cleanup();
                reject(new Error(htmlAudioFallbackFailureMessage(extension)));
              }, HTML_AUDIO_METADATA_TIMEOUT_MS);
              audio.addEventListener('loadedmetadata', handleReady, { once: true });
              audio.addEventListener('error', handleFailure, { once: true });
            });
          }

          async function playHtmlAudioWithTimeout(audio: HTMLAudioElement, extension?: string): Promise<void> {
            let timer: number | undefined;
            try {
              await Promise.race([
                audio.play(),
                new Promise<never>((_, reject) => {
                  timer = window.setTimeout(
                    () => reject(new Error(htmlAudioFallbackFailureMessage(extension))),
                    HTML_AUDIO_PLAY_TIMEOUT_MS,
                  );
                }),
              ]);
            } finally {
              if (timer !== undefined) window.clearTimeout(timer);
            }
          }

          function clearHtmlAudio(audio: HTMLAudioElement | null): void {
            if (!audio) return;
            audio.pause();
            audio.removeAttribute('src');
            audio.load();
          }`;
          text = text.slice(0, start) + block + text.slice(end);
          text = text.replace('\n        await waitForHtmlAudioMetadata', '\n      await waitForHtmlAudioMetadata');
          text = text.replace('\n        if (cancelled || !audioRef.current) return;', '\n      if (cancelled || !audioRef.current) return;');
          fs.writeFileSync(file, text, 'utf8');
          NODE

      - name: Commit formatting only
        run: |
          rm -f .github/workflows/format-u40d3-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: normalize U40-D3 player formatting"
          git push origin HEAD:fix/u40d3-html-audio-stall
