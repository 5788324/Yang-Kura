name: U25 Apply Project Records

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/apply-u25-project-records.mjs'
      - '.github/workflows/u25-apply-project-records.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    steps:
      - name: Check out U25 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update project records
        shell: pwsh
        run: node scripts/apply-u25-project-records.mjs

      - name: Remove one-time record patch
        shell: pwsh
        run: |
          Remove-Item scripts/apply-u25-project-records.mjs
          Remove-Item .github/workflows/u25-apply-project-records.yml

      - name: Commit project records
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATE.md PROJECT_ROADMAP.md scripts/apply-u25-project-records.mjs .github/workflows/u25-apply-project-records.yml
          git commit -m "docs: record permanent daily UI rules"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
