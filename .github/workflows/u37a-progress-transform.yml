name: U37-A Progress Transform

on:
  push:
    branches:
      - agent/u37a-library-page-foundations

permissions:
  contents: write

jobs:
  transform:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: agent/u37a-library-page-foundations
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply progress and plan updates
        run: node scripts/apply-u37a-progress-and-plan.mjs

      - name: Run targeted verifiers
        run: |
          node scripts/verify-u37a-library-page-foundations.mjs
          node scripts/verify-handoff.mjs

      - name: Remove one-shot transform files
        run: |
          rm scripts/apply-u37a-progress-and-plan.mjs
          rm .github/workflows/u37a-progress-transform.yml

      - name: Commit generated U37-A updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "U37-A finalize page foundations and progress"
          git push origin HEAD:agent/u37a-library-page-foundations
