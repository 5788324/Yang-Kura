name: U32 Patch Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose deterministic UI patch
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/u32-rc-ui-cleanup
      - name: Run patch with complete log
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          node scripts/run-u32-ui-cleanup-patch.mjs 2>&1 | Tee-Object -FilePath artifacts/u32-patch.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u32-patch-log
          path: artifacts/u32-patch.log
          if-no-files-found: error
          retention-days: 7
