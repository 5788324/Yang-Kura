name: U32 UI Cleanup Apply

on:
  push:
    branches:
      - agent/u32-rc-ui-cleanup

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'ci: apply and validate U32 UI cleanup')
    name: Apply and validate UI cleanup
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out U32 branch
        uses: actions/checkout@v4
        with:
          ref: agent/u32-rc-ui-cleanup
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply deterministic UI patch
        run: node scripts/apply-u32-ui-cleanup.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild Electron runtime
        run: npm rebuild electron

      - name: Validate TypeScript and builds
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          npm run build
          npm run build:electron

      - name: Run post-cleanup visual audit
        run: node scripts/test-u32-ui-audit.mjs

      - name: Upload post-cleanup screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u32-ui-cleanup-after
          path: artifacts/u32-ui-audit
          if-no-files-found: warn
          retention-days: 14

      - name: Commit validated product changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/components/Dashboard.tsx src/components/AsmrLibrary.tsx src/components/MusicLibrary.tsx src/components/PlaylistPage.tsx src/components/ImporterPage.tsx src/components/SettingsPage.tsx src/index.css
          if (git diff --cached --quiet) {
            Write-Host "No product changes to commit."
            exit 0
          }
          git commit -m "fix: simplify daily UI hierarchy and alignment"
          git push origin HEAD:agent/u32-rc-ui-cleanup
