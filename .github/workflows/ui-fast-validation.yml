name: UI Fast Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/main.tsx'
      - 'src/app/AppRouter.tsx'
      - 'src/app/navigation.ts'
      - 'src/components/SettingsMaintenanceEntry.tsx'
      - 'src/components/DiagnosticsPageShell.tsx'
      - 'src/styles/theme-contrast-bridge.css'
      - 'scripts/verify-u39b-maintenance-entry.mjs'
      - 'scripts/verify-u39d-light-theme-contrast.mjs'
      - 'scripts/test-u39d-light-theme-contrast.mjs'
      - '.github/workflows/ui-fast-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-fast-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-ui:
    name: UI TypeScript, build, U30 and contrast
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild Electron runtime
        run: npm rebuild electron

      - name: Validate TypeScript and builds
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          npm run build
          npm run build:electron

      - name: Verify U39-B maintenance boundary
        run: node scripts/verify-u39b-maintenance-entry.mjs

      - name: Verify U39-D light theme contrast tokens
        run: node scripts/verify-u39d-light-theme-contrast.mjs

      - name: Run U30 UI and accessibility matrix
        run: npm run test:u30:ui-matrix

      - name: Run U39-D Electron contrast acceptance
        run: node scripts/test-u39d-light-theme-contrast.mjs

      - name: Upload UI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-fast-validation-evidence
          path: |
            artifacts/u30-ui-matrix
            artifacts/u39d-light-theme-contrast
          if-no-files-found: warn
          retention-days: 7
