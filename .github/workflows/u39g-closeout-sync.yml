name: U39-G Closeout Sync

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-u39g-closeout.mjs'
      - '.github/workflows/u39g-closeout-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: u39g-closeout-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply U39-G closeout updates
        run: node scripts/apply-u39g-closeout.mjs

      - name: Commit synchronized closeout documents
        shell: bash
        run: |
          git checkout -- .github/workflows/branch-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md PROJECT_STATE.md PROJECT_ROADMAP.md AI_HANDOFF/CURRENT_PROJECT_HANDOFF.md AI_HANDOFF/WORKLOG.md scripts/verify-handoff.mjs
          if git diff --cached --quiet; then
            echo "U39-G closeout already synchronized."
            exit 0
          fi
          git commit -m "docs: synchronize U39 final acceptance"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
