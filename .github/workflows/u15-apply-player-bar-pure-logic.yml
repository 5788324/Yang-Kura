name: Apply U15 Player Bar Pure Logic

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U15 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u15-player-bar-pure-logic
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused PlayerBar patch
        run: node scripts/apply-u15-player-bar-pure-logic.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u15-player-bar-pure-logic.mjs
          rm .github/workflows/u15-apply-player-bar-pure-logic.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: reuse player bar pure logic"
          git push origin HEAD:codex/u15-player-bar-pure-logic
