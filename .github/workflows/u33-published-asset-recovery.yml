name: Beta 1 Historical Release Audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Verify frozen Beta 1 publication record
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Query published Beta 1 release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p artifacts/beta1-release-audit
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/v0.168.0-beta.1" > artifacts/beta1-release-audit/release.json

      - name: Compare remote release with frozen publication state
        shell: bash
        run: |
          node <<'NODE'
          const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const frozen = JSON.parse(fs.readFileSync('release/u33-publication-state.json', 'utf8'));
          const release = JSON.parse(fs.readFileSync('artifacts/beta1-release-audit/release.json', 'utf8'));
          assert.equal(frozen.status, 'published');
          assert.equal(release.tag_name, frozen.tag);
          assert.equal(release.name, frozen.title);
          assert.equal(release.target_commitish, frozen.targetCommitish);
          assert.equal(Boolean(release.prerelease), true);
          assert.equal(Boolean(release.draft), false);
          const remote = new Map((release.assets ?? []).map((asset) => [asset.name, asset]));
          for (const asset of frozen.assets) {
            const item = remote.get(asset.publishedName);
            assert.ok(item, `missing historical asset: ${asset.publishedName}`);
            assert.equal(item.size, asset.sizeBytes, `historical asset size mismatch: ${asset.publishedName}`);
            assert.equal(item.digest, `sha256:${asset.sha256}`, `historical asset digest mismatch: ${asset.publishedName}`);
          }
          assert.equal(remote.size, frozen.assets.length, 'unexpected historical release assets');
          console.log('Beta 1 historical release audit PASS');
          NODE

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta1-historical-release-audit
          path: artifacts/beta1-release-audit
          if-no-files-found: warn
          retention-days: 30
