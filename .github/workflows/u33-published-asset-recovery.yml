name: U33 Published Asset Recovery

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/u33-published-asset-recovery.yml'
      - 'docs/RELEASE_NOTES_0.168.0-beta.1.md'
      - 'scripts/verify-u33-published-release.mjs'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/u33-published-asset-recovery.yml'
      - 'docs/RELEASE_NOTES_0.168.0-beta.1.md'
      - 'scripts/verify-u33-published-release.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: u33-published-asset-recovery-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate published-asset recovery contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate static publication contract
        run: node scripts/verify-u33-published-release.mjs

  recover:
    name: Normalize and verify existing U33 prerelease
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read and validate current published release
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v0.168.0-beta.1
        shell: bash
        run: |
          mkdir -p publish
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > publish/release-before.json
          gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" > publish/tag.json
          node <<'NODE'
          const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const release = JSON.parse(fs.readFileSync('publish/release-before.json', 'utf8'));
          const tag = JSON.parse(fs.readFileSync('publish/tag.json', 'utf8'));
          const expectedNames = [
            'Yang.Kura-0.168.0-beta.1-portable-x64.exe',
            'Yang.Kura-0.168.0-beta.1-setup-x64.exe',
            'SHA256SUMS.txt',
          ];
          assert.equal(release.tag_name, 'v0.168.0-beta.1');
          assert.equal(release.name, 'Yang-Kura 0.168.0 Beta 1');
          assert.equal(Boolean(release.prerelease), true);
          assert.equal(Boolean(release.draft), false);
          assert.equal(tag.object?.sha, release.target_commitish, 'release target must match tag target');
          const assets = new Map((release.assets ?? []).map((asset) => [asset.name, asset]));
          assert.deepEqual([...assets.keys()].sort(), expectedNames.sort(), 'published asset names mismatch');
          const checksumLines = expectedNames
            .filter((name) => name.endsWith('.exe'))
            .map((name) => {
              const asset = assets.get(name);
              assert.ok(asset, `missing release asset: ${name}`);
              assert.match(asset.digest ?? '', /^sha256:[a-f0-9]{64}$/i, `missing release digest: ${name}`);
              assert.ok(Number(asset.size) > 100000, `release asset unexpectedly small: ${name}`);
              return `${asset.digest.slice('sha256:'.length).toLowerCase()} *${name}`;
            });
          fs.writeFileSync('publish/SHA256SUMS.txt', `${checksumLines.join('\n')}\n`, 'utf8');
          NODE
          echo "target=$(jq -r .target_commitish publish/release-before.json)" >> "$GITHUB_OUTPUT"

      - name: Update notes and checksum asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v0.168.0-beta.1
          RELEASE_TITLE: Yang-Kura 0.168.0 Beta 1
        shell: bash
        run: |
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TITLE" \
            --notes-file docs/RELEASE_NOTES_0.168.0-beta.1.md \
            --prerelease
          gh release upload "$RELEASE_TAG" publish/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > publish/release.json

      - name: Verify normalized published release
        run: node scripts/verify-u33-published-release.mjs publish/release.json publish "${{ steps.prepare.outputs.target }}" --remote-only

      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u33-published-asset-recovery-${{ github.sha }}
          path: |
            publish/release-before.json
            publish/release.json
            publish/tag.json
            publish/SHA256SUMS.txt
            publish/published-release-report.json
          if-no-files-found: warn
          retention-days: 30
