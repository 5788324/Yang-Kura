name: Apply U09 Player Hook Extraction

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U09 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u09-player-hooks-progress-baseline
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused LyricsPanel patch
        run: node scripts/apply-u09-player-hooks.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u09-player-hooks.mjs
          rm .github/workflows/u09-apply-player-hooks.yml

      - name: Commit extracted player hooks
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract full player lifecycle hooks"
          git push origin HEAD:codex/u09-player-hooks-progress-baseline
