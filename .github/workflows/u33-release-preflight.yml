name: Beta 2 Publication Record Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta2-publication-record-audit
  cancel-in-progress: true

jobs:
  audit:
    name: Re-check frozen tag and release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Query current tags and releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p artifacts/u33-release-preflight
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/tags?per_page=100" > artifacts/u33-release-preflight/tags-pages.json
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > artifacts/u33-release-preflight/releases-pages.json

      - name: Verify frozen Beta 2 publication record
        env:
          U33_ALLOW_EXISTING_TARGET: '1'
        run: node scripts/verify-u33-release-preflight.mjs

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta2-publication-record-audit
          path: artifacts/u33-release-preflight
          if-no-files-found: error
          retention-days: 30
