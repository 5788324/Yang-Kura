name: U33 Version Sync

on:
  push:
    branches:
      - agent/u33-beta-release
    paths:
      - 'release/u33-release-plan.json'
      - 'scripts/apply-u33-version.mjs'
      - '.github/workflows/u33-version-sync.yml'

permissions:
  contents: write

concurrency:
  group: u33-version-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Synchronize package and README version
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: agent/u33-beta-release
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply release plan version
        run: node scripts/apply-u33-version.mjs

      - name: Commit synchronized version files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json README.md
          if git diff --cached --quiet; then
            echo 'Version files already synchronized.'
            exit 0
          fi
          git commit -m 'release: bump version to 0.168.0-beta.1'
          git push origin HEAD:agent/u33-beta-release
