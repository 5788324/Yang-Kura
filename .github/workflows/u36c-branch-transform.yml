name: U36-C Branch Transform

on:
  push:
    branches:
      - agent/u36c-main-ipc-domains

permissions:
  contents: write

jobs:
  transform:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply deterministic Main IPC migration
        run: node scripts/apply-u36c-main-ipc-domains.mjs

      - name: Run targeted source verifiers
        run: |
          node scripts/verify-u36c-main-ipc-domains.mjs
          node scripts/verify-handoff.mjs

      - name: Remove one-shot transform files
        run: |
          rm scripts/apply-u36c-main-ipc-domains.mjs
          rm .github/workflows/u36c-branch-transform.yml

      - name: Commit generated U36-C changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "U36-C Main IPC domain registration"
          git push origin HEAD:agent/u36c-main-ipc-domains
