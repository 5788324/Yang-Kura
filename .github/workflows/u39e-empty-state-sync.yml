          git add src/features/library/MusicLibraryPage.tsx src/components/ImporterPage.tsx scripts/test-u32-ui-audit.mjs scripts/verify-u39e-empty-state-truthfulness.mjs .github/workflows/ui-fast-validation.yml .github/workflows/branch-validation.yml docs/architecture/U39_EMPTY_STATE_TRUTHFULNESS.md
          git commit -m "fix empty library and importer states"
