name: U28 Apply Project State

on:
  push:
    branches:
      - codex/u28-native-library-workflow
    paths:
      - '.github/workflows/u28-apply-project-state.yml'
      - 'scripts/apply-u27-closeout-u28-state.mjs'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/u28-native-library-workflow
          fetch-depth: 0

      - name: Apply U27 closeout and U28 state
        run: node scripts/apply-u27-closeout-u28-state.mjs

      - name: Commit generated documentation state
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATE.md PROJECT_ROADMAP.md .github/workflows/u28-apply-project-state.yml scripts/apply-u27-closeout-u28-state.mjs
          git commit -m "docs: close U27 and set U28 current"
          git push origin HEAD:codex/u28-native-library-workflow
