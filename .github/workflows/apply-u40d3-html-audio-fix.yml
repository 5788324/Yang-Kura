name: Apply U40-D3 HTMLAudio Fix

on:
  push:
    branches:
      - fix/u40d3-html-audio-stall
    paths:
      - '.github/workflows/apply-u40d3-html-audio-fix.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-u40d3-html-audio-fix.yml'

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/u40d3-html-audio-stall
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply focused source patch
        shell: pwsh
        run: |
          @'
          import fs from 'node:fs';

          function replaceExact(file, from, to) {
            const current = fs.readFileSync(file, 'utf8');
            if (!current.includes(from)) throw new Error(`${file}: patch anchor missing`);
            fs.writeFileSync(file, current.replace(from, to), 'utf8');
          }

          replaceExact(
            'src/hooks/usePlayerBackend.ts',
            `function safeDuration(value: number): number {
            return Number.isFinite(value) && value > 0 ? value : 0;
          }

          function clearHtmlAudio`,
            `function safeDuration(value: number): number {
            return Number.isFinite(value) && value > 0 ? value : 0;
          }

          const HTML_AUDIO_METADATA_TIMEOUT_MS = 10_000;
          const HTML_AUDIO_PLAY_TIMEOUT_MS = 10_000;

          function htmlAudioFallbackFailureMessage(extension?: string): string {
            const format = extension ? \` .\${extension}\` : '';
            return \`基础播放在 10 秒内无法读取或启动当前音频\${format}。请在“设置 → 播放方式”中选择 mpv，或改用基础播放支持的音频编码。\`;
          }

          async function waitForHtmlAudioMetadata(audio: HTMLAudioElement, extension?: string): Promise<void> {
            if (audio.readyState >= 1) return;
            await new Promise<void>((resolve, reject) => {
              let timer: number | undefined;
              const cleanup = () => {
                if (timer !== undefined) window.clearTimeout(timer);
                audio.removeEventListener('loadedmetadata', handleReady);
                audio.removeEventListener('error', handleFailure);
              };
              const handleReady = () => {
                cleanup();
                resolve();
              };
              const handleFailure = () => {
                cleanup();
                const detail = audio.error?.message || (audio.error ? \`错误码 \${audio.error.code}\` : '未知媒体错误');
                reject(new Error(\`基础播放无法读取当前音频元数据：\${detail}。请在“设置 → 播放方式”中选择 mpv。\`));
              };
              timer = window.setTimeout(() => {
                cleanup();
                reject(new Error(htmlAudioFallbackFailureMessage(extension)));
              }, HTML_AUDIO_METADATA_TIMEOUT_MS);
              audio.addEventListener('loadedmetadata', handleReady, { once: true });
              audio.addEventListener('error', handleFailure, { once: true });
            });
          }

          async function playHtmlAudioWithTimeout(audio: HTMLAudioElement, extension?: string): Promise<void> {
            let timer: number | undefined;
            try {
              await Promise.race([
                audio.play(),
                new Promise<never>((_, reject) => {
                  timer = window.setTimeout(
                    () => reject(new Error(htmlAudioFallbackFailureMessage(extension))),
                    HTML_AUDIO_PLAY_TIMEOUT_MS,
                  );
                }),
              ]);
            } finally {
              if (timer !== undefined) window.clearTimeout(timer);
            }
          }

          function clearHtmlAudio`,
          );

          replaceExact(
            'src/hooks/usePlayerBackend.ts',
            `      audioRef.current.load();
            if (audioRef.current.readyState < 1) {
              await new Promise<void>((resolve, reject) => {
                const target = audioRef.current;
                if (!target) return reject(new Error('HTMLAudio 实例已释放。'));
                const cleanup = () => {
                  target.removeEventListener('loadedmetadata', handleReady);
                  target.removeEventListener('error', handleFailure);
                };
                const handleReady = () => {
                  cleanup();
                  resolve();
                };
                const handleFailure = () => {
                  cleanup();
                  reject(new Error('HTMLAudio 无法读取音频元数据。'));
                };
                target.addEventListener('loadedmetadata', handleReady, { once: true });
                target.addEventListener('error', handleFailure, { once: true });
              });
            }
            if (cancelled || !audioRef.current) return;`,
            `      audioRef.current.load();
            await waitForHtmlAudioMetadata(audioRef.current, result.extension);
            if (cancelled || !audioRef.current) return;`,
          );

          replaceExact(
            'src/hooks/usePlayerBackend.ts',
            `      if (stateRef.current.isPlaying) await audioRef.current.play();`,
            `      if (stateRef.current.isPlaying) await playHtmlAudioWithTimeout(audioRef.current, result.extension);`,
          );

          replaceExact(
            'src/hooks/usePlayerBackend.ts',
            `      } catch (error) {
                if (cancelled) return;
                setPlayerState((previous) => ({`,
            `      } catch (error) {
                if (cancelled) return;
                clearHtmlAudio(audioRef.current);
                setPlayerState((previous) => ({`,
          );

          replaceExact(
            'src/components/SettingsPageDaily.tsx',
            `        : '未检测到增强播放组件；当前使用基础播放，不影响常见音频格式。');`,
            `        : '未检测到增强播放组件；常见格式将使用基础播放，遇到不支持的编码时请点击“选择播放组件”。');`,
          );

          replaceExact(
            'src/components/SettingsPageDaily.tsx',
            `<div><h3 className="text-sm font-bold">本地音频播放</h3><p className="mt-1 text-xs text-text-muted">优先使用增强播放组件；不可用时自动使用基础播放。</p></div>`,
            `<div><h3 className="text-sm font-bold">本地音频播放</h3><p className="mt-1 text-xs text-text-muted">优先使用增强播放组件；不可用时尝试基础播放，不支持的编码会明确提示。</p></div>`,
          );

          fs.writeFileSync('scripts/verify-u40d3-html-audio-stall.mjs', `#!/usr/bin/env node
          import fs from 'node:fs';
          const backend = fs.readFileSync('src/hooks/usePlayerBackend.ts', 'utf8').replace(/\\r\\n/g, '\\n');
          const settings = fs.readFileSync('src/components/SettingsPageDaily.tsx', 'utf8').replace(/\\r\\n/g, '\\n');
          const required = [
            'HTML_AUDIO_METADATA_TIMEOUT_MS = 10_000',
            'HTML_AUDIO_PLAY_TIMEOUT_MS = 10_000',
            'await waitForHtmlAudioMetadata(audioRef.current, result.extension)',
            'await playHtmlAudioWithTimeout(audioRef.current, result.extension)',
            'clearHtmlAudio(audioRef.current);',
            '设置 → 播放方式',
          ];
          for (const token of required) if (!backend.includes(token)) throw new Error('missing backend marker: ' + token);
          if (!settings.includes('遇到不支持的编码时请点击“选择播放组件”')) throw new Error('settings guidance missing');
          if (!settings.includes('不支持的编码会明确提示')) throw new Error('settings boundary copy missing');
          console.log('[u40d3] HTMLAudio stall timeout and mpv guidance PASS');
          `, 'utf8');
          '@ | Set-Content -LiteralPath .u40d3-patch.mjs -Encoding UTF8
          node .u40d3-patch.mjs
          Remove-Item .u40d3-patch.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Focused validation
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build:electron
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/verify-u40d3-html-audio-stall.mjs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run test:u29:electron-e2e
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit focused fix
        shell: bash
        run: |
          rm -f .github/workflows/apply-u40d3-html-audio-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/usePlayerBackend.ts src/components/SettingsPageDaily.tsx scripts/verify-u40d3-html-audio-stall.mjs .github/workflows/apply-u40d3-html-audio-fix.yml
          git diff --cached --check
          git commit -m "U40-D3: stop HTMLAudio fallback pseudo-playing"
          git push origin HEAD:fix/u40d3-html-audio-stall
