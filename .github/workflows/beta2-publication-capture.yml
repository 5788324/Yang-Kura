name: Beta 2 Publication Capture

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/beta2-publication-capture.yml'

permissions:
  contents: write
  issues: write

concurrency:
  group: beta2-publication-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Wait for validated Beta 2 prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v0.169.0-beta.2
          EXPECTED_TARGET: 14bc78a81c827882efc232c6c6c12f0d8ed04542
        shell: bash
        run: |
          mkdir -p artifacts/beta2-publication/assets
          ready=0
          for attempt in $(seq 1 120); do
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > artifacts/beta2-publication/release.json 2>/dev/null; then
              if RELEASE_JSON=artifacts/beta2-publication/release.json EXPECTED_TARGET="$EXPECTED_TARGET" node <<'NODE'
          const fs = require('node:fs');
          const release = JSON.parse(fs.readFileSync(process.env.RELEASE_JSON, 'utf8'));
          const names = (release.assets ?? []).map((asset) => asset.name).sort();
          const expectedNames = [
            'SHA256SUMS.txt',
            'Yang Kura-0.169.0-beta.2-portable-x64.exe',
            'Yang Kura-0.169.0-beta.2-setup-x64.exe',
          ];
          const candidates = expectedNames.map((name) => [name, name.replaceAll(' ', '.')]);
          const complete = release.tag_name === 'v0.169.0-beta.2'
            && release.name === 'Yang-Kura 0.169.0 Beta 2 · 个人日用版'
            && release.target_commitish === process.env.EXPECTED_TARGET
            && release.prerelease === true
            && release.draft === false
            && release.published_at
            && candidates.every((options) => options.some((name) => names.includes(name)))
            && (release.assets ?? []).length === 3
            && (release.assets ?? []).every((asset) => asset.state === 'uploaded' && asset.size > 0 && asset.digest);
          process.exit(complete ? 0 : 1);
          NODE
              then
                ready=1
                break
              fi
            fi
            echo "Release not complete yet: attempt $attempt"
            sleep 15
          done
          if [ "$ready" -ne 1 ]; then
            echo 'Timed out waiting for validated Beta 2 release.' >&2
            exit 1
          fi

      - name: Download published assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release download v0.169.0-beta.2 --repo "$GITHUB_REPOSITORY" --dir artifacts/beta2-publication/assets

      - name: Verify remote assets and write publication state
        shell: bash
        run: |
          node <<'NODE'
          const assert = require('node:assert/strict');
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');

          const release = JSON.parse(fs.readFileSync('artifacts/beta2-publication/release.json', 'utf8'));
          const plan = JSON.parse(fs.readFileSync('release/u33-release-plan.json', 'utf8'));
          const assetDirectory = 'artifacts/beta2-publication/assets';
          const hashFile = (filePath) => crypto.createHash('sha256').update(fs.readFileSync(filePath)).digest('hex');
          const candidates = (name) => [...new Set([name, name.replaceAll(' ', '.')])];
          const remoteByName = new Map(release.assets.map((asset) => [asset.name, asset]));
          const matched = new Map();
          for (const localName of plan.assets) {
            const remoteName = candidates(localName).find((candidate) => remoteByName.has(candidate));
            assert.ok(remoteName, `missing published asset: ${localName}`);
            matched.set(localName, remoteByName.get(remoteName));
          }
          assert.equal(remoteByName.size, plan.assets.length, 'unexpected published assets');

          const checksumAsset = matched.get('SHA256SUMS.txt');
          const checksumPath = path.join(assetDirectory, checksumAsset.name);
          assert.ok(fs.existsSync(checksumPath), 'downloaded SHA256SUMS.txt missing');
          const checksumMap = new Map(fs.readFileSync(checksumPath, 'utf8').trim().split(/\r?\n/).filter(Boolean).map((line) => {
            const match = line.match(/^([a-f0-9]{64}) \*(.+)$/i);
            assert.ok(match, `invalid checksum line: ${line}`);
            return [match[2], match[1].toLowerCase()];
          }));

          const assets = plan.assets.map((localName) => {
            const remote = matched.get(localName);
            const downloadedPath = path.join(assetDirectory, remote.name);
            assert.ok(fs.existsSync(downloadedPath), `downloaded asset missing: ${remote.name}`);
            const sha256 = hashFile(downloadedPath);
            assert.equal(remote.digest, `sha256:${sha256}`, `remote digest mismatch: ${remote.name}`);
            if (localName.endsWith('.exe')) {
              const expected = checksumMap.get(localName) ?? checksumMap.get(remote.name);
              assert.ok(expected, `checksum entry missing: ${localName}`);
              assert.equal(expected, sha256, `checksum mismatch: ${localName}`);
            }
            return {
              localName,
              publishedName: remote.name,
              sizeBytes: remote.size,
              sha256,
              downloadUrl: remote.browser_download_url,
            };
          });

          const state = {
            schemaVersion: 1,
            status: 'published',
            version: plan.version,
            tag: release.tag_name,
            title: release.name,
            releaseId: release.id,
            targetCommitish: release.target_commitish,
            publishedAt: release.published_at,
            url: release.html_url,
            prerelease: release.prerelease,
            draft: release.draft,
            assets,
          };
          fs.writeFileSync('release/beta2-publication-state.json', `${JSON.stringify(state, null, 2)}\n`);
          fs.writeFileSync('artifacts/beta2-publication/publication-state.json', `${JSON.stringify(state, null, 2)}\n`);

          const summary = [
            '## Beta 2 个人日用版已发布并完成远端校验',
            '',
            `- tag：\`${state.tag}\``,
            `- 标题：${state.title}`,
            `- Release ID：\`${state.releaseId}\``,
            `- 目标提交：\`${state.targetCommitish}\``,
            `- 发布时间：\`${state.publishedAt}\``,
            `- 资产：${state.assets.length} 个，名称、大小、下载文件 SHA-256 与远端 digest 全部一致`,
            '',
            ...state.assets.map((asset) => `- \`${asset.publishedName}\` — ${asset.sizeBytes} bytes — \`${asset.sha256}\``),
            '',
            '该证据由一次性发布捕获工作流生成。后续只需完成状态文档收口并关闭本 Issue。',
          ].join('\n');
          fs.writeFileSync('artifacts/beta2-publication/issue-comment.md', summary);
          NODE

      - name: Record evidence on Issue 65
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh issue comment 65 --repo "$GITHUB_REPOSITORY" --body-file artifacts/beta2-publication/issue-comment.md

      - name: Commit frozen publication record and remove capture workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/beta2-publication-capture.yml
          git add release/beta2-publication-state.json
          git commit -m 'release: record 0.169.0 Beta 2 publication'
          git push origin HEAD:main

      - name: Upload capture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta2-publication-capture
          path: artifacts/beta2-publication
          if-no-files-found: warn
          retention-days: 30
