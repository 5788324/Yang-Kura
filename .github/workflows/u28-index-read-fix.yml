name: U28 Windows Index Read Fix

on:
  push:
    branches:
      - agent/u28-library-reconciliation

permissions:
  contents: write

concurrency:
  group: u28-index-read-fix
  cancel-in-progress: true

jobs:
  apply-validate-commit:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/u28-library-reconciliation
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply deterministic Electron index reader patch
        shell: pwsh
        run: node scripts/apply-u28-index-read-fix.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: TypeScript validation
        run: npm run lint

      - name: Electron build
        run: npm run build:electron

      - name: Windows index reader runtime verifier
        run: node scripts/verify-u28-index-read-runtime.mjs

      - name: U28 reconciliation verifier
        run: node scripts/verify-u28-library-reconciliation.mjs

      - name: Stable regression
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run verify:stable

      - name: Production build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build

      - name: Commit validated product patch
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/main.ts
          if (git diff --cached --quiet) {
            Write-Host "No product patch to commit."
          } else {
            git commit -m "fix: read Windows-encoded library index files"
            git push origin HEAD:agent/u28-library-reconciliation
          }
