name: Branch Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: branch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows stable regression
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run focused UI verifiers
        shell: pwsh
        run: |
          Get-ChildItem -Path scripts -Filter 'verify-u*.mjs' |
            Sort-Object Name |
            ForEach-Object {
              Write-Host "Running $($_.Name)"
              node $_.FullName
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }

      - name: Run stable regression
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run verify:stable

      - name: Build production renderer
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build
