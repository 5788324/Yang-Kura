name: Branch Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/u28-library-reconciliation
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: branch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows U28 full-chain validation
    runs-on: windows-latest
    timeout-minutes: 55

    steps:
      - name: Check out U28 branch
        uses: actions/checkout@v4
        with:
          ref: agent/u28-library-reconciliation
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply deterministic U28 repair
        run: node scripts/apply-u28-full-chain-fix.mjs

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit high and critical dependency risk
        run: npm audit --audit-level=high

      - name: Rebuild Electron runtime
        run: npm rebuild electron

      - name: TypeScript validation
        run: npm run lint

      - name: Build desktop application
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run build
          npm run build:electron

      - name: Run U28 Electron full-chain UI acceptance
        run: npm run test:u28:electron-e2e

      - name: Upload U28 Electron screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u28-electron-e2e
          path: artifacts/u28-electron-e2e
          if-no-files-found: warn
          retention-days: 14

      - name: Run focused UI verifiers
        id: focused-verifiers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $results = [System.Collections.Generic.List[string]]::new()
          $results.Add("verifier`tstatus`texit_code")
          $failed = $false

          Get-ChildItem -Path scripts -Filter 'verify-u*.mjs' |
            Sort-Object Name |
            ForEach-Object {
              Write-Host "Running $($_.Name)"
              node $_.FullName
              $exitCode = $LASTEXITCODE
              $status = if ($exitCode -eq 0) { 'PASS' } else { 'FAIL' }
              $results.Add("$($_.Name)`t$status`t$exitCode")
              if ($exitCode -ne 0) { $failed = $true }
            }

          $reportPath = 'artifacts/focused-verifier-results.tsv'
          $results | Set-Content -Path $reportPath -Encoding utf8
          $results | ForEach-Object { Write-Host $_ }
          if ($failed) { exit 1 }

      - name: Upload focused verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-verifier-results
          path: artifacts/focused-verifier-results.tsv
          if-no-files-found: warn
          retention-days: 7

      - name: Run stable regression
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run verify:stable 2>&1 | Tee-Object -FilePath artifacts/stable-regression.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload stable regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-regression-log
          path: artifacts/stable-regression.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build production renderer again after regression
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build

      - name: Commit validated U28 repair
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/Dashboard.tsx electron/main.ts scripts/verify-u28-library-reconciliation.mjs scripts/test-u28-electron-e2e.mjs package.json .github/workflows/branch-validation.yml
          if (git diff --cached --quiet) {
            Write-Host "No validated repair changes to commit."
          } else {
            git commit -m "fix: validate U28 library state end to end"
            git push origin HEAD:agent/u28-library-reconciliation
          }
