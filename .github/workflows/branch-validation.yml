name: Branch Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: u30-materialize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize validated U30 product patch
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Materialize product files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          git fetch origin main
          git show origin/main:.github/workflows/branch-validation.yml | Set-Content -Path .github/workflows/branch-validation.yml -Encoding utf8
          node scripts/relax-u30-patch-anchors.mjs
          node scripts/apply-u30-ui-fast-track.mjs
          node scripts/fix-u30-generated-test.mjs

          $temporaryFiles = @(
            'scripts/apply-u30-ui-fast-track.mjs',
            'scripts/relax-u30-patch-anchors.mjs',
            'scripts/fix-u30-generated-test.mjs',
            '.github/workflows/u30-apply.yml'
          )
          foreach ($file in $temporaryFiles) {
            if (Test-Path $file) { Remove-Item -Force $file }
          }

          git checkout origin/${{ github.head_ref }} -- .github/workflows/branch-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short 2>&1 | Tee-Object -FilePath artifacts/u30-materialize.log
          git commit -m "fix: complete U30 responsive UI fast-track" 2>&1 | Tee-Object -FilePath artifacts/u30-materialize.log -Append
          $commitExit = $LASTEXITCODE
          "commit_exit=$commitExit" | Tee-Object -FilePath artifacts/u30-materialize.log -Append
          if ($commitExit -eq 0) {
            git push origin HEAD:${{ github.head_ref }} 2>&1 | Tee-Object -FilePath artifacts/u30-materialize.log -Append
            $pushExit = $LASTEXITCODE
          } else {
            $pushExit = 99
          }
          "push_exit=$pushExit" | Tee-Object -FilePath artifacts/u30-materialize.log -Append
          "$commitExit,$pushExit" | Set-Content -Path artifacts/u30-materialize-status.txt -Encoding ascii

      - name: Upload materialization log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u30-materialize-log
          path: |
            artifacts/u30-materialize.log
            artifacts/u30-materialize-status.txt
          if-no-files-found: error
          retention-days: 7

      - name: Assert materialization succeeded
        shell: pwsh
        run: |
          $status = Get-Content artifacts/u30-materialize-status.txt
          if ($status -ne '0,0') { throw "U30 materialization failed: $status" }
