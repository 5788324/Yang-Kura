name: Branch Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: branch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows stable regression
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply pending U26 source repair
        if: github.event.pull_request.head.ref == 'codex/u26-ai-library-maintenance'
        shell: pwsh
        run: |
          if (Test-Path scripts/fix-u26-details-closing.mjs) {
            node scripts/fix-u26-details-closing.mjs
            Remove-Item scripts/fix-u26-details-closing.mjs
            if (Test-Path .github/workflows/u26-fix-details-closing.yml) {
              Remove-Item .github/workflows/u26-fix-details-closing.yml
            }
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "fix: close U26 library maintenance details"
            git push origin HEAD:${{ github.head_ref }}
          }

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit high and critical dependency risk
        run: npm audit --audit-level=high

      - name: Run focused UI verifiers
        id: focused-verifiers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/focused-verifier-logs | Out-Null
          $results = [System.Collections.Generic.List[string]]::new()
          $results.Add("verifier`tstatus`texit_code")
          $failed = $false

          Get-ChildItem -Path scripts -Filter 'verify-u*.mjs' |
            Sort-Object Name |
            ForEach-Object {
              Write-Host "Running $($_.Name)"
              $logPath = Join-Path 'artifacts/focused-verifier-logs' "$($_.BaseName).log"
              node $_.FullName 2>&1 | Tee-Object -FilePath $logPath
              $exitCode = $LASTEXITCODE
              $status = if ($exitCode -eq 0) { 'PASS' } else { 'FAIL' }
              $results.Add("$($_.Name)`t$status`t$exitCode")
              if ($exitCode -ne 0) { $failed = $true }
            }

          $reportPath = 'artifacts/focused-verifier-results.tsv'
          $results | Set-Content -Path $reportPath -Encoding utf8
          $results | ForEach-Object { Write-Host $_ }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Focused verifier results'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          $results | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'

          if ($failed) { exit 1 }

      - name: Upload focused verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-verifier-results
          path: |
            artifacts/focused-verifier-results.tsv
            artifacts/focused-verifier-logs
          if-no-files-found: warn
          retention-days: 7

      - name: Run stable regression
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          npm run verify:stable 2>&1 | Tee-Object -FilePath artifacts/stable-regression.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload stable regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-regression-log
          path: artifacts/stable-regression.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build production renderer
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build
