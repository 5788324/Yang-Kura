name: Branch Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: u31-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply and validate U31 importer transactions
    runs-on: windows-latest
    timeout-minutes: 70

    steps:
      - name: Check out U31 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply U31 integration patch
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          node scripts/apply-u31-importer-transaction-hardening.mjs 2>&1 | Tee-Object -FilePath artifacts/u31-patch.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload U31 patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u31-patch-log
          path: artifacts/u31-patch.log
          if-no-files-found: warn
          retention-days: 7

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild Electron runtime
        run: npm rebuild electron

      - name: TypeScript and desktop builds
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          npm run build
          npm run build:electron

      - name: Run U31 importer transaction matrix
        run: npm run test:u31:importer-transactions

      - name: Run U31 focused verifier
        run: npm run verify:u31-importer-transaction-hardening

      - name: Run existing importer and index tests
        run: |
          npm run test:importer:smoke
          npm run test:mvp129-index-maintenance

      - name: Run U28-U30 Electron regressions
        run: |
          npm run test:u28:electron-e2e
          npm run test:u29:electron-e2e
          npm run test:u30:ui-matrix

      - name: Run stable regression
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run verify:stable

      - name: Commit validated U31 product changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/main.ts src/types/electron-api.d.ts package.json scripts/run-stable-regression.mjs
          git rm scripts/apply-u31-importer-transaction-hardening.mjs
          git commit -m "fix: make importer file operations transactional"
          git push origin HEAD:${{ github.head_ref }}
