name: Branch Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: branch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows stable regression
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply U12 patch and restore validation workflow
        if: github.head_ref == 'codex/u12-full-player-presentational-split'
        shell: pwsh
        run: |
          @'
          const fs = require('fs');
          const path = 'src/components/LyricsPanel.tsx';
          let text = fs.readFileSync(path, 'utf8').replace(/\r\n/g, '\n');

          const replaceOnce = (before, after, label) => {
            if (!text.includes(before)) throw new Error(`U12 patch anchor missing: ${label}`);
            text = text.replace(before, after);
          };

          replaceOnce('  ChevronDown, \n  Play, ', '  Play, ', 'ChevronDown import');

          const hookAnchor = "import { useVinylMotion } from '../hooks/useVinylMotion';\n";
          const componentImports =
            "import FullPlayerHeader, { type FullPlayerStyle } from './player/FullPlayerHeader';\n" +
            "import PlayerFocusSummary from './player/PlayerFocusSummary';\n";
          if (!text.includes(componentImports)) {
            replaceOnce(hookAnchor, hookAnchor + componentImports, 'component import insertion');
          }

          replaceOnce(
            "const [playerStyle, setPlayerStyle] = useState<'classic' | 'vinyl' | 'lyrics'>('classic');",
            "const [playerStyle, setPlayerStyle] = useState<FullPlayerStyle>('classic');",
            'player style type',
          );

          const startMarker = '      {/* Header Area (Borderless and fades out during inactivity) */}';
          const endMarker = '      <div id="mvp78-player-panel-layout-review"';
          const start = text.indexOf(startMarker);
          const end = text.indexOf(endMarker, start);
          if (start < 0 || end < 0) throw new Error('U12 presentational block anchors missing');

          const replacement = `      <FullPlayerHeader
            isInactive={isUserInactive}
            closeButtonRef={closeButtonRef}
            onClose={onClose}
            playerStyle={playerStyle}
            onPlayerStyleChange={setPlayerStyle}
            modeTitle={playerSurfaceSummary.modeTitle}
            sourceHint={playerSurfaceSummary.sourceHint}
          />

          <PlayerFocusSummary
            isInactive={isUserInactive}
            model={mvp73PlayerFocus}
          />

`;

          text = text.slice(0, start) + replacement + text.slice(end);
          fs.writeFileSync(path, text, 'utf8');
          '@ | node

          git fetch origin main
          git checkout origin/main -- .github/workflows/branch-validation.yml
          if (Test-Path '.github/workflows/u12-apply-full-player-presentational-split.yml') {
            git rm .github/workflows/u12-apply-full-player-presentational-split.yml
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/LyricsPanel.tsx .github/workflows/branch-validation.yml
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "refactor: delegate full player presentation blocks"
            git push origin HEAD:${{ github.head_ref }}
          }

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit high and critical dependency risk
        run: npm audit --audit-level=high

      - name: Run focused UI verifiers
        shell: pwsh
        run: |
          Get-ChildItem -Path scripts -Filter 'verify-u*.mjs' |
            Sort-Object Name |
            ForEach-Object {
              Write-Host "Running $($_.Name)"
              node $_.FullName
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }

      - name: Run stable regression
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run verify:stable

      - name: Build production renderer
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build
