name: Branch Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'AI_HANDOFF/**'
      - 'src/hooks/useAudioPlayer.ts'
      - 'src/hooks/usePlayerSubtitles.ts'
      - 'src/components/PlayerBar.tsx'
      - 'src/components/PlayerBarPrimarySections.tsx'
      - 'src/components/PlayerBarAuxiliaryControls.tsx'
      - 'src/components/PlayerProgressTrack.tsx'
      - 'src/components/PlayerTransientPresenters.tsx'
      - 'src/app/AppRouter.tsx'
      - 'src/app/navigation.ts'
      - 'src/components/SettingsMaintenanceEntry.tsx'
      - 'src/components/DiagnosticsPageShell.tsx'
      - 'scripts/verify-u38c-player-subtitles.mjs'
      - 'scripts/verify-u39a-playerbar-theme.mjs'
      - 'scripts/verify-u39b-maintenance-entry.mjs'
      - 'scripts/verify-u39f-architecture-guardrails.mjs'
      - 'scripts/test-u39f-architecture-guardrails.mjs'
      - 'scripts/verify-u39-final-acceptance.mjs'
      - '.github/workflows/architecture-guardrails.yml'
      - '.github/workflows/u39-final-acceptance.yml'
      - 'release/beta3-release-plan.json'
      - 'scripts/prepare-beta3-package-version.mjs'
      - 'scripts/verify-beta3-release.mjs'
      - 'scripts/verify-beta3-preflight.mjs'
      - 'scripts/verify-beta3-published-release.mjs'
      - '.github/workflows/beta3-personal-release.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: branch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows full-chain regression
    runs-on: windows-latest
    timeout-minutes: 80
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Audit high and critical dependency risk
        run: npm audit --audit-level=high
      - name: Prepare Electron runtime
        run: |
          npm rebuild electron
          npm run patch:electron-builder
      - name: TypeScript and builds
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          npm run build
          npm run build:electron
      - name: Core Electron journeys
        run: |
          npm run test:u28:electron-e2e
          npm run test:u29:electron-e2e
          npm run test:u30:ui-matrix
          npm run test:u31:importer-transactions
          node scripts/test-u32-ui-audit.mjs
      - name: Current behavior verifiers
        shell: pwsh
        run: |
          $verifiers = @(
            'scripts/verify-u28-index-read-runtime.mjs',
            'scripts/verify-u28-library-reconciliation.mjs',
            'scripts/verify-u29-player-reliability.mjs',
            'scripts/verify-u30-ui-fast-track.mjs',
            'scripts/verify-u31-importer-transaction-hardening.mjs',
            'scripts/verify-u39a-playerbar-theme.mjs',
            'scripts/verify-u39b-maintenance-entry.mjs',
            'scripts/verify-u39c-root-authorization-persistence.mjs'
          )
          foreach ($verifier in $verifiers) {
            node $verifier
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
      - name: Stable regression and final build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run verify:stable
          npm run build
