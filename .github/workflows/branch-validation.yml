name: Branch Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: u30-pr-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply and validate U30 fast-track
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Restore permanent gate baseline
        shell: pwsh
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/branch-validation.yml | Set-Content -Path .github/workflows/branch-validation.yml -Encoding utf8

      - name: Relax patch anchors
        run: node scripts/relax-u30-patch-anchors.mjs

      - name: Apply U30 product and test patch
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          node scripts/apply-u30-ui-fast-track.mjs 2>&1 | Tee-Object -FilePath artifacts/u30-patch.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload U30 patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u30-patch-log
          path: artifacts/u30-patch.log
          if-no-files-found: warn
          retention-days: 7

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild Electron runtime
        run: npm rebuild electron

      - name: TypeScript and builds
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          npm run build
          npm run build:electron

      - name: Run focused U30 verifier
        run: npm run verify:u30-ui-fast-track

      - name: Run U30 Electron UI matrix
        run: npm run test:u30:ui-matrix

      - name: Upload U30 screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u30-ui-matrix-apply
          path: artifacts/u30-ui-matrix
          if-no-files-found: warn
          retention-days: 14

      - name: Commit formal U30 changes and remove temporary machinery
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/index.css src/components/Sidebar.tsx src/components/PlayerBar.tsx src/components/PlayerBarPrimarySections.tsx src/components/PlayerBarAuxiliaryControls.tsx package.json .github/workflows/branch-validation.yml scripts/test-u30-ui-matrix.mjs scripts/verify-u30-ui-fast-track.mjs
          git rm scripts/apply-u30-ui-fast-track.mjs scripts/relax-u30-patch-anchors.mjs .github/workflows/u30-apply.yml
          git commit -m "fix: complete U30 responsive UI fast-track"
          git push origin HEAD:${{ github.head_ref }}
