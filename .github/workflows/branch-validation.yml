name: Branch Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: branch-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows full-chain regression
    runs-on: windows-latest
    timeout-minutes: 80

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/u32-rc-ui-cleanup

      - name: Apply U32 UI cleanup when needed
        shell: pwsh
        run: |
          if (-not (Select-String -Path src/App.tsx -Pattern 'u32-release-ui' -Quiet)) {
            node scripts/run-u32-ui-cleanup-patch.mjs
          } else {
            Write-Host 'U32 UI cleanup already applied.'
          }

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit high and critical dependency risk
        run: npm audit --audit-level=high

      - name: Rebuild Electron runtime for desktop E2E
        run: npm rebuild electron

      - name: TypeScript validation
        run: npm run lint

      - name: Build desktop application
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run build
          npm run build:electron

      - name: Run U28 resource-library Electron E2E
        run: npm run test:u28:electron-e2e

      - name: Run U29 player Electron E2E
        run: npm run test:u29:electron-e2e

      - name: Run U30 UI and accessibility matrix
        run: npm run test:u30:ui-matrix

      - name: Run U31 importer transaction matrix
        run: npm run test:u31:importer-transactions

      - name: Run U32 release-candidate visual audit
        run: node scripts/test-u32-ui-audit.mjs

      - name: Upload Electron E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u28-u32-electron-e2e
          path: |
            artifacts/u28-electron-e2e
            artifacts/u29-electron-e2e
            artifacts/u30-ui-matrix
            artifacts/u31-importer-transactions
            artifacts/u32-ui-audit
          if-no-files-found: warn
          retention-days: 14

      - name: Run focused U verifiers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $results = [System.Collections.Generic.List[string]]::new()
          $results.Add("verifier`tstatus`texit_code")
          $failed = $false

          Get-ChildItem -Path scripts -Filter 'verify-u*.mjs' |
            Sort-Object Name |
            ForEach-Object {
              Write-Host "Running $($_.Name)"
              node $_.FullName
              $exitCode = $LASTEXITCODE
              $status = if ($exitCode -eq 0) { 'PASS' } else { 'FAIL' }
              $results.Add("$($_.Name)`t$status`t$exitCode")
              if ($exitCode -ne 0) { $failed = $true }
            }

          $results | Set-Content -Path artifacts/focused-verifier-results.tsv -Encoding utf8
          if ($failed) { exit 1 }

      - name: Upload focused verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-verifier-results
          path: artifacts/focused-verifier-results.tsv
          if-no-files-found: warn
          retention-days: 7

      - name: Run stable regression
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run verify:stable 2>&1 | Tee-Object -FilePath artifacts/stable-regression.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload stable regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-regression-log
          path: artifacts/stable-regression.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build production renderer again after regression
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build

      - name: Commit validated U32 product changes
        if: success()
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/components/Dashboard.tsx src/components/AsmrLibrary.tsx src/components/MusicLibrary.tsx src/components/PlaylistPage.tsx src/components/ImporterPage.tsx src/components/SettingsPage.tsx src/index.css
          if (git diff --cached --quiet) {
            Write-Host 'No U32 product changes to commit.'
            exit 0
          }
          git commit -m "fix: simplify daily UI hierarchy and alignment"
          git push origin HEAD:agent/u32-rc-ui-cleanup
