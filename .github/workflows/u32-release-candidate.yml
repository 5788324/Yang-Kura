name: U32 Release Candidate Packaging

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/test-u32-release-candidate-packaging.mjs'
      - 'scripts/test-u32-packaged-page-readiness.mjs'
      - 'scripts/verify-u32-release-candidate-packaging.mjs'
      - 'electron-builder.config.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/u32-release-candidate.yml'
      - 'docs/U32_RELEASE_CANDIDATE_PACKAGING.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: u32-release-candidate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-and-accept:
    name: Windows portable and NSIS acceptance
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect package-relevant changes
        id: scope
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -ne "pull_request") {
            "package_required=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $action = "${{ github.event.action }}"
          $before = "${{ github.event.before }}"
          if ($action -eq "synchronize" -and $before -and $before -notmatch '^0+$') {
            $base = $before
          } else {
            $base = "${{ github.event.pull_request.base.sha }}"
          }
          $files = @(git diff --name-only $base HEAD)
          Write-Host "scope_base=$base"
          Write-Host "scope_head=$(git rev-parse HEAD)"
          Write-Host "changed_files=$($files -join ',')"
          $packagePatterns = @(
            '^scripts/test-u32-release-candidate-packaging\.mjs$',
            '^scripts/test-u32-packaged-page-readiness\.mjs$',
            '^scripts/verify-u32-release-candidate-packaging\.mjs$',
            '^electron-builder\.config\.cjs$',
            '^package\.json$',
            '^package-lock\.json$',
            '^docs/U32_RELEASE_CANDIDATE_PACKAGING\.md$'
          )
          $packageFiles = @($files | Where-Object {
            $file = $_
            $packagePatterns | Where-Object { $file -match $_ }
          })
          $required = $packageFiles.Count -gt 0
          "package_required=$($required.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($required) {
            Write-Host "Packaging required by: $($packageFiles -join ', ')"
          } else {
            Write-Host "Packaging skipped: no dependency, installer, packaging script or release-document changes."
          }

      - name: Packaging skip notice
        if: steps.scope.outputs.package_required != 'true'
        run: echo "Portable/NSIS acceptance is not required for this change set."

      - name: Set up Node 22
        if: steps.scope.outputs.package_required == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies without lifecycle scripts
        if: steps.scope.outputs.package_required == 'true'
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit high and critical dependency risk
        if: steps.scope.outputs.package_required == 'true'
        run: npm audit --audit-level=high

      - name: Rebuild Electron and apply builder compatibility patch
        if: steps.scope.outputs.package_required == 'true'
        shell: pwsh
        run: |
          npm rebuild electron
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run patch:electron-builder
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate TypeScript and build desktop sources
        if: steps.scope.outputs.package_required == 'true'
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          npm run lint
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build:electron
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build portable and NSIS release candidates
        if: steps.scope.outputs.package_required == 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          NODE_OPTIONS: --max-old-space-size=8192
        run: node node_modules/electron-builder/cli.js --win portable nsis --config electron-builder.config.cjs

      - name: Run packaged release-candidate acceptance
        if: steps.scope.outputs.package_required == 'true'
        run: node scripts/test-u32-release-candidate-packaging.mjs

      - name: Require complete packaged home content
        if: steps.scope.outputs.package_required == 'true'
        run: node scripts/test-u32-packaged-page-readiness.mjs

      - name: Upload release candidates and acceptance evidence
        if: always() && steps.scope.outputs.package_required == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: u32-release-candidate-windows
          path: |
            release/*.exe
            artifacts/u32-release-candidate
          if-no-files-found: warn
          retention-days: 14
