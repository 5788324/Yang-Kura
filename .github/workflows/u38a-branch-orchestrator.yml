name: U38-A Branch Orchestrator

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-u38a-refactor.py'
      - 'docs/U38A_TRIGGER.md'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/player-session-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-session-boundaries
      - name: Execute U38-A branch transformation
        id: transform
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python scripts/apply-u38a-refactor.py > /tmp/u38a-refactor.log 2>&1
          status=$?
          set -e
          echo "$status" > /tmp/u38a-refactor.status
          cat /tmp/u38a-refactor.log
          exit "$status"
      - name: Upload transformation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: u38a-refactor-diagnostics
          path: |
            scripts/apply-u38a-refactor.py
            /tmp/u38a-refactor.log
            /tmp/u38a-refactor.status
          if-no-files-found: error
          retention-days: 7
      - name: Commit transformed branch
        shell: bash
        run: |
          status=$(cat /tmp/u38a-refactor.status)
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          rm -f docs/U38A_TRIGGER.md scripts/apply-u38a-refactor.py .github/workflows/player-session-boundary-sync.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'U38-A: split player queue history and persistence'
          git push origin HEAD:agent/player-session-boundaries
