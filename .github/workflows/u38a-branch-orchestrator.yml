name: U38-A Branch Orchestrator

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-u38a-refactor.py'
      - 'docs/U38A_TRIGGER.md'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/player-session-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-session-boundaries
      - name: Execute U38-A branch transformation
        shell: bash
        run: python scripts/apply-u38a-refactor.py
      - name: Commit generated source and documentation
        shell: bash
        run: |
          git checkout -- .github/workflows/branch-validation.yml
          rm -f docs/U38A_TRIGGER.md scripts/apply-u38a-refactor.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src package.json scripts docs README.md PROJECT_STATE.md PROJECT_ROADMAP.md AI_HANDOFF
          git commit -m 'U38-A: split player queue history and persistence'
          git push origin HEAD:agent/player-session-boundaries
