name: U38-A Branch Orchestrator

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/u38a-branch-orchestrator.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-session-boundaries
      - name: Execute embedded branch transformation
        shell: bash
        run: |
          awk 'BEGIN{capture=0} /python - <<.PY./{capture=1;next} /^          PY$/{capture=0} capture{sub(/^          /,"");print}' .github/workflows/player-session-boundary-sync.yml > /tmp/u38a-refactor.py
          python /tmp/u38a-refactor.py
          rm .github/workflows/player-session-boundary-sync.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'U38-A: split player queue history and persistence'
          git push origin HEAD:agent/player-session-boundaries
