name: U38-A Branch Orchestrator

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/apply-u38a-refactor.py'
      - 'docs/U38A_TRIGGER.md'

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'agent/player-session-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-session-boundaries
      - name: Execute U38-A branch transformation
        shell: bash
        run: python scripts/apply-u38a-refactor.py
      - name: Assemble transformed workspace
        shell: bash
        run: |
          mkdir -p artifacts/u38a-transformed-workspace
          while IFS= read -r path; do
            mkdir -p "artifacts/u38a-transformed-workspace/$(dirname "$path")"
            cp "$path" "artifacts/u38a-transformed-workspace/$path"
          done <<'EOF'
          src/player/playerQueueTransitions.ts
          src/hooks/usePlayerSessionPersistence.ts
          src/hooks/useAudioPlayer.ts
          scripts/test-u29-electron-e2e.mjs
          scripts/verify-u38a-player-session-boundaries.mjs
          package.json
          scripts/run-stable-regression.mjs
          .github/workflows/branch-validation.yml
          docs/architecture/U38_PLAYER_SESSION_BOUNDARIES.md
          PROJECT_STATE.md
          PROJECT_ROADMAP.md
          AI_HANDOFF/CURRENT_PROJECT_HANDOFF.md
          AI_HANDOFF/WORKLOG.md
          README.md
          docs/architecture/REFACTOR_BACKLOG.md
          EOF
      - name: Upload transformed workspace
        uses: actions/upload-artifact@v4
        with:
          name: u38a-transformed-workspace
          path: artifacts/u38a-transformed-workspace
          if-no-files-found: error
          retention-days: 7
