name: Apply U21 Player Progress Interaction

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U21 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u21-player-progress-interaction
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused progress interaction patch
        run: node scripts/apply-u21-player-progress-interaction.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u21-player-progress-interaction.mjs
          rm .github/workflows/u21-apply-player-progress.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract player progress interaction"
          git push origin HEAD:codex/u21-player-progress-interaction
