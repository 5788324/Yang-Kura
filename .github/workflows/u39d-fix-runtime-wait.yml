name: U39-D Fix Runtime Wait

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/u39d-fix-runtime-wait.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/u39d-light-theme-contrast
      - name: Add reload-safe DOM guards
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/test-u39d-light-theme-contrast.mjs')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              '"document.documentElement.dataset.ykTheme === \'mist-ivory\'"',
              '"document.documentElement?.dataset?.ykTheme === \'mist-ivory\'"',
          )
          source = source.replace(
              '"document.body.dataset.ykTheme === \'mist-ivory\'"',
              '"document.body?.dataset?.ykTheme === \'mist-ivory\'"',
          )
          path.write_text(source, encoding='utf-8')
          PY
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/test-u39d-light-theme-contrast.mjs
          git commit -m "make light theme runtime wait reload-safe"
          git push origin HEAD:agent/u39d-light-theme-contrast
