name: Apply U20 Player Auxiliary Controls

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out U20 branch
        uses: actions/checkout@v4
        with:
          ref: codex/u20-player-auxiliary-controls
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply focused auxiliary control patch
        run: node scripts/apply-u20-player-auxiliary-controls.mjs

      - name: Remove temporary patch automation
        shell: bash
        run: |
          rm scripts/apply-u20-player-auxiliary-controls.mjs
          rm .github/workflows/u20-apply-player-auxiliary-controls.yml

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract player auxiliary controls"
          git push origin HEAD:codex/u20-player-auxiliary-controls
