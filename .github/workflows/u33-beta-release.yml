name: Beta 2 Published Release Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta2-published-release-audit
  cancel-in-progress: true

jobs:
  audit:
    name: Re-verify frozen Beta 2 prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download published release metadata and assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p artifacts/beta2-published-release/assets
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/v0.169.0-beta.2" > artifacts/beta2-published-release/release.json
          gh release download v0.169.0-beta.2 --repo "$GITHUB_REPOSITORY" --dir artifacts/beta2-published-release/assets

      - name: Verify frozen publication record
        shell: bash
        run: |
          expected_target=$(node -p "require('./release/beta2-publication-state.json').targetCommitish")
          node scripts/verify-u33-published-release.mjs \
            artifacts/beta2-published-release/release.json \
            artifacts/beta2-published-release/assets \
            "$expected_target" \
            --remote-only

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta2-published-release-audit
          path: artifacts/beta2-published-release
          if-no-files-found: warn
          retention-days: 30
